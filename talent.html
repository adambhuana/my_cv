<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker - Sistem Pencari Kerja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        /* Specific overrides for this page if needed */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 172, 254, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status.info {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
            border: 1px solid rgba(79, 172, 254, 0.3);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-overlay">
        <div class="spinner"></div>
        <div style="color: var(--text-light); font-weight: 600;">Menghubungkan ke Database...</div>
        <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Mohon tunggu sebentar</div>
    </div>

    <!-- Connection Error -->
    <div id="connectionError" class="loading-overlay hidden">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger); margin-bottom: 1rem;"></i>
        <h2 style="color: var(--text-light); margin-bottom: 0.5rem;">Koneksi Gagal</h2>
        <p id="errorMessage"
            style="color: var(--text-muted); text-align: center; max-width: 400px; margin-bottom: 1.5rem;"></p>
        <button class="btn btn-primary" onclick="retryConnection()">🔄 Coba Lagi</button>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display: none;">

        <!-- Auth Section -->
        <div id="authSection" class="auth-page">
            <div class="auth-container">
                <div class="auth-header">
                    <a href="index.html"
                        style="position: absolute; top: 1rem; right: 1rem; color: white; font-size: 1.2rem;">
                        <i class="fas fa-home"></i>
                    </a>
                    <h2><i class="fas fa-user-circle"></i> Job Seeker</h2>
                    <p style="opacity: 0.9;">Akses akun untuk mengelola profil Anda</p>
                </div>

                <div class="auth-content">
                    <!-- Login Form -->
                    <div id="loginForm" class="auth-content-pane">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="loginEmail" class="form-control" placeholder="contoh@email.com"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-control"
                                placeholder="Masukkan password" required>
                        </div>
                        <button onclick="login()" class="btn btn-primary btn-block">🔐 Login</button>
                        <div id="loginStatus" class="status"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile / Dashboard Section -->
        <div id="profileSection" class="hidden" style="padding: 2rem;">
            <div class="container">
                <div class="dashboard-header">
                    <div>
                        <h2 style="color: var(--primary); margin-bottom: 0.5rem;">Dashboard Saya</h2>
                        <p style="color: var(--text-muted);">Kelola data dan CV Anda</p>
                    </div>
                    <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
                </div>

                <div id="profileContent">
                    <!-- Dynamic Content Loaded via JS -->
                </div>

                <div id="profileStatus" class="status"></div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        /* ===========================================================
           KONFIGURASI SUPABASE
        =========================================================== */
        const SUPABASE_URL = 'https://xwzuxewhlhoogwvnutfk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3enV4ZXdobGhvb2d3dm51dGZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2ODgxNjksImV4cCI6MjA2OTI2NDE2OX0.9FNylEbi9bSaGu2tu7-MYoEiyjkKHtDTell1UMmraWc';

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        async function initializeApp() {
            try {
                // Check connection
                const { error } = await db.from('job_seekers').select('id').limit(1);
                if (error) throw new Error('Koneksi gagal: ' + error.message);
                showMainApp();
            } catch (error) {
                showConnectionError(error.message);
            }
        }

        /* UI Utilities */
        function showMainApp() {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('connectionError').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'block';
        }

        function showConnectionError(message) {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('connectionError').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = message;
        }

        function retryConnection() {
            document.getElementById('connectionError').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');
            setTimeout(initializeApp, 1000);
        }

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = msg;
                el.className = 'status show ' + type;
            }
        }

        function hideAllStatus() {
            document.querySelectorAll('.status').forEach(el => el.classList.remove('show'));
        }

        /* Tabs */
        window.switchAuthTab = function (tab) {
            // Update Tab Buttons
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            // Find the clicked element or matched element
            const clickedTab = Array.from(document.querySelectorAll('.auth-tab')).find(el => el.textContent.toLowerCase().includes(tab === 'login' ? 'login' : 'daftar'));
            if (clickedTab) clickedTab.classList.add('active');

            // Update Content
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');

            document.getElementById(tab + 'Form').classList.remove('hidden');
            hideAllStatus();
        }

        /* Register */
        window.register = async function () {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const fullName = document.getElementById('regFullName').value.trim();

            if (!email || !password || !fullName) {
                showStatus('registerStatus', '❌ Email, password, dan nama wajib diisi!', 'error');
                return;
            }

            showStatus('registerStatus', '⏳ Mendaftarkan akun...', 'info');

            try {
                const { error } = await db.rpc('register_user', {
                    p_email: email,
                    p_password: password,
                    p_full_name: fullName,
                });

                if (error) throw error;
                showStatus('registerStatus', '✅ Akun berhasil dibuat! Silakan login.', 'success');
                // Optional: switch to login tab automatically
            } catch (error) {
                showStatus('registerStatus', '❌ ' + error.message, 'error');
            }
        }

        /* Login */
        window.login = async function () {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showStatus('loginStatus', '❌ Email dan password wajib diisi!', 'error');
                return;
            }

            showStatus('loginStatus', '⏳ Login...', 'info');

            try {
                const { data, error } = await db.rpc('login_user', {
                    p_email: email,
                    p_password: password,
                });

                if (error || !data || data.length === 0) {
                    throw new Error('Email atau password salah!');
                }

                currentUser = data[0];
                showStatus('loginStatus', '✅ Login berhasil!', 'success');
                setTimeout(showProfile, 1000);
            } catch (error) {
                showStatus('loginStatus', '❌ ' + error.message, 'error');
            }
        }

        /* Profile & Files */
        function showProfile() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('profileSection').classList.remove('hidden');
            loadProfile();
        }

        window.logout = function () {
            currentUser = null;
            document.getElementById('profileSection').classList.add('hidden');
            document.getElementById('authSection').style.display = 'flex';
            hideAllStatus();
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        async function loadProfile(successMsg = "") {
            if (!currentUser) return;

            const { data, error } = await db
                .from("job_seekers")
                .select("*")
                .eq("id", currentUser.id)
                .single();

            if (error) {
                showStatus("profileStatus", "⚠️ Gagal memuat profil.", "error"); // Changed ID to profileStatus generic or create one
                return;
            }

            currentUser = data;

            document.getElementById("profileContent").innerHTML = `
                <div class="features-grid">
                    <div class="card dashboard-card">
                        <h3 style="color: var(--text-dark); margin-bottom: 1rem;">👤 Informasi Pribadi</h3>
                        <div style="margin-bottom: 0.5rem; color: var(--text-dark);"><strong>Nama:</strong> ${currentUser.full_name}</div>
                        <div style="color: var(--text-dark);"><strong>Email:</strong> ${currentUser.email}</div>
                    </div>
                    
                    <div class="card dashboard-card">
                         <h3 style="color: var(--text-dark); margin-bottom: 1rem;">📄 Upload CV (PDF)</h3>
                         <input type="file" id="cvFile" accept="application/pdf" class="form-control" style="margin-bottom:1rem;">
                         <button onclick="uploadCV()" class="btn btn-primary"><i class="fas fa-upload"></i> Upload ke Google Drive</button>
                         <div id="cvStatus" class="status"></div>
                    </div>

                    <div class="card dashboard-card">
                         <h3 style="color: var(--text-dark); margin-bottom: 1rem;">📎 CV Terbaru</h3>
                         ${currentUser.cv_url
                    ? `<a href="${currentUser.cv_url}" target="_blank" class="btn btn-secondary" style="color: var(--text-dark); border-color: var(--text-dark);">
                                  <i class="fas fa-external-link-alt"></i> Lihat CV Terakhir
                               </a>
                               <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;">Diupload: ${new Date(currentUser.updated_at).toLocaleString("id-ID")}</p>`
                    : `<span style="color: var(--text-muted);">Belum ada CV diupload</span>`
                }
                    </div>
                </div>
            `;

            if (successMsg) {
                // Wait for DOM
                setTimeout(() => showStatus("cvStatus", successMsg, "success"), 100);
            }
        }

        window.readFileAsBase64 = function (file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        window.uploadCV = async function () {
            const fileInput = document.getElementById("cvFile");
            if (!fileInput.files.length) {
                showStatus("cvStatus", "❌ Pilih file PDF terlebih dahulu!", "error");
                return;
            }

            const file = fileInput.files[0];
            if (file.type !== "application/pdf") {
                showStatus("cvStatus", "❌ Hanya file PDF yang diperbolehkan!", "error");
                return;
            }

            showStatus("cvStatus", "⏳ Mengupload CV ke Google Drive...", "info");

            try {
                const base64 = await readFileAsBase64(file);
                // Note: Ensure this endpoint handles the request correctly.
                const endpoint = "https://my-cv-psi-one.vercel.app/upload";
                const payload = {
                    filename: `${currentUser.full_name || "CV"}_${Date.now()}.pdf`,
                    mimetype: file.type,
                    content_base64: base64.split(",")[1],
                    email: currentUser.email,
                    full_name: currentUser.full_name,
                    old_cv_url: currentUser.cv_url || ""
                };

                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                const result = await response.json();
                if (result.status !== "success") throw new Error(result.message);

                const now = new Date().toISOString();
                const { error } = await db
                    .from("job_seekers")
                    .update({ cv_url: result.fileUrl, updated_at: now })
                    .eq("id", currentUser.id);

                if (error) throw error;

                // Reload profile
                setTimeout(async () => {
                    loadProfile("✅ CV berhasil diupload!");
                }, 1000);

            } catch (error) {
                console.error(error);
                showStatus("cvStatus", "❌ Upload gagal: " + error.message, "error");
            }
        }

        // Init
        window.addEventListener('load', function () {
            setTimeout(initializeApp, 500);
        });

    </script>
</body>

</html>
